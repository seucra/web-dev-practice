# Workflow for building React projects and deploying to GitHub Pages
name: Build & Deploy to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build port1
        working-directory: ./projects/port1
        run: |
          npm ci
          npm run build

      - name: Build port2
        working-directory: ./projects/portfolios/port2
        run: |
          npm ci
          npm run build

      - name: Build port3
        working-directory: ./projects/portfolios/port3
        run: |
          npm ci
          npm run build

      - name: Prepare deployment
        run: |
          mkdir -p dist/projects/portfolios/port1 dist/projects/portfolios/port2 dist/projects/portfolios/port3
          cp -r projects/portfolios/port2/dist/* dist/projects/portfolios/port2/ 2>/dev/null || true
          cp -r projects/portfolios/port3/dist/* dist/projects/portfolios/port3/ 2>/dev/null || true
          cp -r projects/portfolios/port1/* dist/projects/portfolios/port1/ 2>/dev/null || true
          cp index.html dist/
          cp README.md dist/ 2>/dev/null || true
          cp -r projects/*/[!d]* dist/projects/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
